# Railway/Nixpacks needs both runtimes: Node builds the Vite UI, Python runs FastAPI.
# Python packages are installed into a writable virtualenv because Nix Python is PEP 668
# externally managed and cannot be modified with a global `pip install`.
[phases.setup]
nixPkgs = [
  "nodejs_20",
  "python311",
  "python311Packages.pip",
  "python311Packages.setuptools",
  "python311Packages.virtualenv",
  "python311Packages.wheel"
]

[phases.install]
cmds = [
  "virtualenv /opt/venv",
  ". /opt/venv/bin/activate && pip install -r requirements.txt",
  "npm install",
  "npm --prefix frontend install"
]

[phases.build]
cmds = ["npm --prefix frontend run build"]

[start]
cmd = "/opt/venv/bin/python -m uvicorn backend.app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
